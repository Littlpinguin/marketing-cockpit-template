# Marketing Copilot Template — Qdrant pipeline configuration
#
# Single source of truth for:
#   - How the Qdrant collection is configured (dim, distance, batch)
#   - Which embedder and enrichers are active
#   - Which sources to scan and how
#   - Which functionalities (editorial calendar, email marketing, ...) map to which tool
#
# The wizard (/tools-setup + /connect-qdrant) fills the {{placeholders}}.
# The runbook (runbook.md in this directory) is the process documentation;
# any change to this config must be reflected in the runbook in the same commit.

qdrant:
  collection: "{{QDRANT_COLLECTION}}"
  vector_size: 3072
  distance: Cosine
  batch_size: 50

embedder:
  provider: gemini
  model: gemini-embedding-001
  output_dimensions: 3072
  task_type_ingest: RETRIEVAL_DOCUMENT
  task_type_query: RETRIEVAL_QUERY
  retry:
    max_attempts: 3
    backoff_seconds: [1, 4, 16]
  rate_limit:
    sleep_between_calls_sec: 0.2

registry:
  path: registry.json
  backup_on_write: true

logging:
  path: logs/
  level: INFO
  keep_last_n_runs: 30

# ------------------------------------------------------------------------
# Functionalities — tool-agnostic mapping
# ------------------------------------------------------------------------
# Each functionality lists which tool backs it. The connector is selected
# based on the tool name. If the tool has no built-in connector, the
# wizard generates a stub at `_integrations/connectors/<tool>.py`. When
# enabled=false, the functionality is skipped entirely during sync.
#
# Built-in connectors currently shipped (v0.2.0):
#   - editorial_calendar: notion (ingestion)
#   - knowledge_base:     outline (ingestion)
#   - email_marketing:    none (dry-run payload builders for mailerlite, mailchimp
#                         in scripts/dry-run-push.py — real push stubs required)
#   - events_platform:    none (stubs to implement)
#   - crm:                none (stubs to implement)

functionalities:
  editorial_calendar:
    tool: "{{EDITORIAL_CALENDAR_TOOL}}"        # notion / airtable / trello / clickup / google-sheets / custom / none
    enabled: {{EDITORIAL_CALENDAR_ENABLED}}
    connector: "{{EDITORIAL_CALENDAR_TOOL}}"
    config:
      # Notion-specific
      database_id: "{{NOTION_EDITORIAL_DATABASE_ID}}"
      data_source_id: "{{NOTION_EDITORIAL_DATA_SOURCE_ID}}"
      status_filter: "{{EDITORIAL_CALENDAR_STATUS_FILTER}}"
      require_validated_checkbox: false
      # Airtable-specific (if selected)
      base_id: "{{AIRTABLE_BASE_ID}}"
      table_name: "{{AIRTABLE_TABLE_NAME}}"

  email_marketing:
    tool: "{{EMAIL_MARKETING_TOOL}}"           # mailerlite / mailchimp / resend / brevo / convertkit / custom / none
    enabled: {{EMAIL_MARKETING_ENABLED}}
    config:
      api_key_env: "{{EMAIL_MARKETING_ENV_KEY}}"
      list_id: "{{EMAIL_MARKETING_LIST_ID}}"

  knowledge_base:
    tool: "{{KNOWLEDGE_BASE_TOOL}}"            # outline / notion / confluence / gitbook / custom / none
    enabled: {{KNOWLEDGE_BASE_ENABLED}}
    connector: "{{KNOWLEDGE_BASE_TOOL}}"
    config:
      url: "{{KNOWLEDGE_BASE_URL}}"
      api_key_env: "{{KNOWLEDGE_BASE_ENV_KEY}}"
      # Collection-name -> id mapping, filled during /tools-setup
      collections: {}

  events_platform:
    tool: "{{EVENTS_PLATFORM_TOOL}}"           # livestorm / zoom / riverside / google-meet / custom / none
    enabled: {{EVENTS_PLATFORM_ENABLED}}
    config:
      api_key_env: "{{EVENTS_PLATFORM_ENV_KEY}}"

  crm:
    tool: "{{CRM_TOOL}}"                       # hubspot / pipedrive / odoo / notion / airtable / custom / none
    enabled: {{CRM_ENABLED}}

  image_generation:
    tool: gemini-3-pro-image-preview
    enabled: {{IMAGE_GENERATION_ENABLED}}
    skill: image-generation
    config:
      model_env: GOOGLE_AI_IMAGE_MODEL

  semantic_memory:
    tool: qdrant
    enabled: {{QDRANT_ENABLED}}
    skill: "mcp__qdrant__qdrant_search"

# ------------------------------------------------------------------------
# Enrichers — strict execution order, toggle via enabled
# ------------------------------------------------------------------------
enrichers:
  hash:
    enabled: true
    algo: sha256
    normalize: true

  summary:
    enabled: true
    provider: gemini
    model: gemini-2.5-flash
    prompt: |
      Summarize this {{COMPANY_NAME}} content in at most 2 sentences.
      Factual, no embellishment, no filler adjectives. Do not start with
      "this text is about". Lead directly with the main information.
    max_output_tokens: 150
    fail_silent: true

  entities:
    enabled: true
    provider: gemini
    model: gemini-2.5-flash
    prompt: |
      Extract the following entities from this text as a FLAT LIST of strings
      (no objects, no categories, no nesting).

      Entity types to extract:
      - clients or customers mentioned
      - team members / stakeholders
      - tools and products mentioned
      - factual key numbers (e.g. "8.8/10", "100+ experts", "+19.8%")
      - significant geographic locations

      STRICT format (single key "entities", flat list of strings):
      {"entities": ["Client1", "Tool1", "8.8/10", "Paris"]}

      Do NOT use {"type": "...", "value": "..."} format. ONLY a flat list.
      No comments, no markdown fences, no text before or after the JSON.
    max_output_tokens: 400
    fail_silent: true

  claims:
    enabled: true
    provider: gemini
    model: gemini-2.5-flash
    prompt: |
      Extract the 3 to 5 main factual claims from this text.
      Each claim must be short (max 15 words), verifiable, non-subjective,
      no value judgement.

      STRICT format (single key "claims", flat list of strings):
      {"claims": ["Claim 1.", "Claim 2.", "Claim 3."]}

      Do NOT use {"text": "...", "category": "..."} format. ONLY a flat list.
      No comments, no markdown fences, no text before or after the JSON.
    max_output_tokens: 400
    fail_silent: true

  meeting:
    enabled: true
    provider: gemini
    model: gemini-2.5-flash
    applies_to_types: [transcript]
    prompt: |
      This document is a meeting transcript.
      Extract the decisions made and the action items.
      Return JSON: {"decisions": ["..."], "action_items": [{"who": "...", "what": "...", "when": "..."}]}
      If no decision or no action item, return an empty list.
      No comments, no markdown fences.
    max_output_tokens: 800
    fail_silent: true

# ------------------------------------------------------------------------
# Sources — what gets ingested into Qdrant
# ------------------------------------------------------------------------
sources:

  brand:
    connector: filesystem
    pattern: "01-brand/*.md"
    type: brand-doc
    channel: internal
    language: "{{BRAND_BILINGUAL}}"
    author: default
    status: published
    chunking: sliding_window
    chunk_size_tokens: 600
    chunk_overlap_tokens: 100
    exclude_files:
      - CLAUDE.md

  newsletters:
    connector: filesystem
    pattern: "04-email/newsletter/editions/**/*.md"
    type: newsletter
    channel: newsletter
    language: "{{BRAND_DEFAULT_LANGUAGE}}"
    author: default
    status: published
    chunking: by_section_h2

  promos:
    connector: filesystem
    pattern: "04-email/promos/**/*.md"
    type: promo
    channel: email
    language: "{{BRAND_BILINGUAL}}"
    author: default
    status: published
    chunking: whole

  sales_outreach:
    connector: filesystem
    pattern: "04-email/sales-outreach/**/*.md"
    type: sales-email
    channel: email
    language: "{{BRAND_BILINGUAL}}"
    author: sales
    status: published
    chunking: whole

  linkedin:
    connector: filesystem
    pattern: "03-social-media/linkedin/examples/**/*.md"
    type: linkedin-post
    channel: linkedin
    language: "{{BRAND_BILINGUAL}}"
    author: default
    status: published
    chunking: whole

  discord:
    connector: filesystem
    pattern: "03-social-media/discord/examples/**/*.md"
    type: discord-post
    channel: discord
    language: "{{BRAND_DEFAULT_LANGUAGE}}"
    author: default
    status: published
    chunking: whole

  whatsapp:
    connector: filesystem
    pattern: "03-social-media/whatsapp/examples/**/*.md"
    type: whatsapp-post
    channel: whatsapp
    language: "{{BRAND_DEFAULT_LANGUAGE}}"
    author: default
    status: published
    chunking: whole

  blog:
    connector: filesystem
    pattern: "09-blog-seo/articles/**/*.md"
    type: blog-post
    channel: blog
    language: "{{BRAND_BILINGUAL}}"
    author: default
    status: published
    chunking: by_section_h2

  landing_pages:
    connector: filesystem
    pattern: "05-web-content/**/index.html"
    type: landing-page
    channel: website
    language: "{{BRAND_BILINGUAL}}"
    author: default
    status: published
    chunking: by_section

  notion:
    connector: notion
    database_id: "{{NOTION_EDITORIAL_DATABASE_ID}}"
    data_source_id: "{{NOTION_EDITORIAL_DATA_SOURCE_ID}}"
    status_filter: "{{EDITORIAL_CALENDAR_STATUS_FILTER}}"
    require_validated_checkbox: false
    channel_mapping: {}
    chunking: whole

  transcripts:
    connector: transcripts
    pattern: "_sources/transcriptions/**/*.md"
    type: transcript
    channel: internal
    language: "{{BRAND_DEFAULT_LANGUAGE}}"
    status: published
    chunking: by_transcript_section
    transcript_target_tokens: 800
    transcript_max_tokens: 1200
    exclude_files:
      - .DS_Store

  reports:
    connector: filesystem
    pattern: "_sources/reports/**/*.md"
    type: report-data
    channel: internal
    language: "{{BRAND_BILINGUAL}}"
    author: default
    status: published
    chunking: by_section_h2

  research:
    connector: filesystem
    pattern: "_sources/research/**/*.md"
    type: research-note
    channel: internal
    language: "{{BRAND_BILINGUAL}}"
    author: default
    status: published
    chunking: by_section_h2

  outline:
    connector: outline
    type: outline-doc
    language: "{{BRAND_BILINGUAL}}"
    chunking: sliding_window
    chunk_size_tokens: 600
    chunk_overlap_tokens: 100
    collections: {}   # Filled during /tools-setup: {"Collection Name": "uuid-..."}

# ------------------------------------------------------------------------
# Global exclusions
# ------------------------------------------------------------------------
global_exclusions:
  filenames:
    - CLAUDE.md
    - README.md
    - STATUS.md
    - TODO.md
    - .DS_Store
    - .gitignore
    - playbook.md
    - schedule.md
  path_contains:
    - /templates/
    - /archives/
    - /drafts/wip/
    - /wip/
    - /node_modules/
    - /.git/
    - /_bootstrap/inputs/
    - /_examples/
    - /.setup-archive/
  filename_patterns:
    - "*[WIP]*"
    - "*_wip.*"
